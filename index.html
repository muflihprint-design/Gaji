<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GajiTrack Cloud - Full Features</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .pulse-dot { width: 8px; height: 8px; background-color: #10b981; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        .row-clickable:hover { cursor: pointer; background-color: #f1f5f9; }
        .input-accounting { text-align: right; font-family: 'Courier New', Courier, monospace; font-weight: 700; }
        .row-inactive { opacity: 0.5; filter: grayscale(1); }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; visibility: hidden; }
        .loading-overlay.active { visibility: visible; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="p-4 md:p-8 text-slate-900">
    <div id="loader" class="loading-overlay">
        <div class="flex flex-col items-center gap-2">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600"></div>
            <p class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest">Sinkronisasi Cloud...</p>
        </div>
    </div>

    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <div class="flex items-center gap-2 mb-2">
                    <span class="px-3 py-1 bg-indigo-100 text-indigo-700 text-[10px] font-extrabold rounded-full uppercase tracking-tighter flex items-center gap-2">
                        <span class="pulse-dot"></span> Spreadsheet Database: Active
                    </span>
                </div>
                <h1 class="text-4xl font-extrabold tracking-tight text-slate-900">Payroll Tracker</h1>
                <p class="text-slate-500 font-medium">Real-time sync dengan Google Sheets</p>
                <p class="text-[10px] text-slate-400 font-bold uppercase mt-1">Live: <span id="displayToday"></span></p>
            </div>
            <div class="bg-slate-900 text-white p-6 rounded-3xl shadow-2xl flex flex-col min-w-[280px] border-b-4 border-emerald-500">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Total Akrual Kas (Aktif)</span>
                <span id="grandTotal" class="text-3xl font-black text-emerald-400">Rp 0</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Sidebar: Forms -->
            <div class="lg:col-span-5 space-y-6">
                <div class="glass-panel p-6 rounded-3xl shadow-sm space-y-5 border-t-4 border-indigo-500">
                    <h2 id="formTitle" class="text-xl font-bold text-slate-800">Data Karyawan</h2>
                    <input type="hidden" id="editId">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5 ml-1">Nama Karyawan</label>
                            <input type="text" id="name" class="w-full px-4 py-3 rounded-2xl border border-slate-200 outline-none font-medium" placeholder="Contoh: John Doe">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5 ml-1">Gaji Bulanan</label>
                                <input type="text" id="salaryDisplay" class="w-full px-4 py-3 rounded-2xl border border-slate-200 outline-none input-accounting text-emerald-700 bg-emerald-50/30" placeholder="Rp 0" oninput="formatAccountingInput(this)">
                                <input type="hidden" id="salary">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-indigo-600 uppercase mb-1.5 ml-1">Tgl Join (1-31)</label>
                                <input type="number" id="startDay" min="1" max="31" class="w-full px-4 py-3 rounded-2xl border-2 border-indigo-100 outline-none text-center font-black" placeholder="15">
                            </div>
                        </div>

                        <!-- Cuti Individu -->
                        <div class="p-4 bg-slate-50 rounded-2xl border border-dashed border-slate-300">
                            <label class="block text-xs font-black text-slate-500 uppercase mb-3">Cuti Individu</label>
                            <div class="grid grid-cols-5 gap-2 mb-3">
                                <input type="number" id="tempHolidayStart" min="1" max="31" class="col-span-2 px-2 py-2 rounded-lg border border-slate-200 text-xs text-center font-bold" placeholder="Tgl Mulai">
                                <input type="number" id="tempHolidayEnd" min="1" max="31" class="col-span-2 px-2 py-2 rounded-lg border border-slate-200 text-xs text-center font-bold" placeholder="Tgl Selesai">
                                <button onclick="addHolidayRow()" class="bg-indigo-500 text-white rounded-lg flex items-center justify-center">
                                    +
                                </button>
                            </div>
                            <div id="holidayList" class="space-y-2 max-h-32 overflow-y-auto"></div>
                        </div>
                    </div>
                    <button id="btnSubmit" onclick="saveEmployee()" class="w-full py-4 bg-slate-900 text-white font-black rounded-2xl shadow-xl transition active:scale-95 uppercase">Simpan & Sync</button>
                    <button id="btnCancel" onclick="resetForm()" class="hidden w-full text-xs font-bold text-slate-400 uppercase">Batalkan Edit</button>
                </div>

                <!-- Libur Nasional -->
                <div class="glass-panel p-6 rounded-3xl shadow-sm space-y-4 border-t-4 border-emerald-500">
                    <h2 class="text-xl font-bold text-slate-800">Libur Nasional</h2>
                    <div class="grid grid-cols-5 gap-2">
                        <input type="number" id="globalHolidayStart" min="1" max="31" class="col-span-2 px-3 py-3 rounded-xl border border-slate-200 text-xs text-center font-bold" placeholder="Tgl Mulai">
                        <input type="number" id="globalHolidayEnd" min="1" max="31" class="col-span-2 px-3 py-3 rounded-xl border border-slate-200 text-xs text-center font-bold" placeholder="Tgl Selesai">
                        <button onclick="addGlobalHoliday()" class="bg-emerald-500 text-white rounded-xl">+</button>
                    </div>
                    <div id="globalHolidayList" class="space-y-2 max-h-40 overflow-y-auto"></div>
                </div>
            </div>

            <!-- Table Section -->
            <div class="lg:col-span-7">
                <div class="glass-panel rounded-3xl overflow-hidden shadow-sm">
                    <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white/50">
                        <h2 class="font-bold text-slate-800 uppercase">Daftar Akrual</h2>
                        <button onclick="fetchFromCloud()" class="text-[10px] font-black text-indigo-500 uppercase">Refresh Cloud</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <tbody id="payrollTable" class="divide-y divide-slate-100"></tbody>
                        </table>
                        <div id="emptyState" class="p-10 text-center text-slate-300 italic">Memuat data...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 bg-slate-900 text-white rounded-2xl shadow-2xl opacity-0 transition-all pointer-events-none z-50 text-[10px] font-black uppercase tracking-widest"></div>

    <script>
        // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw49881W_hgmXeViW2fgbPx3Z1XPzWV5os6EGR1cByMQ-gtYX3FGpTUout7hQ5OT6Mr/exec"; 
        
        let employees = [];
        let globalHolidays = [];
        let currentHolidays = [];

        window.onload = async () => {
            updateLiveClock();
            await fetchFromCloud();
            setInterval(updateRealTimeValues, 1000);
        };

        function showLoader(show) { document.getElementById('loader').classList.toggle('active', show); }

        async function fetchFromCloud() {
            if (SCRIPT_URL === "URL_APPS_SCRIPT_ANDA") {
                showNotify("ERROR: URL SCRIPT BELUM DISET");
                return;
            }
            showLoader(true);
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                employees = data.employees || [];
                globalHolidays = data.globalHolidays || [];
                renderTable();
                renderGlobalHolidayList();
            } catch (e) {
                showNotify("GAGAL MEMUAT DATA");
            } finally { showLoader(false); }
        }

        async function syncToCloud() {
            showLoader(true);
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ employees, globalHolidays })
                });
                showNotify("CLOUD TERSINKRONISASI");
            } catch (e) {
                showNotify("GAGAL SYNC");
            } finally { showLoader(false); }
        }

        function formatAccountingInput(input) {
            let value = input.value.replace(/[^0-9]/g, "");
            if (value === "") {
                input.value = "";
                document.getElementById('salary').value = "";
                return;
            }
            document.getElementById('salary').value = value;
            input.value = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(value);
        }

        function formatIDR(val) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(val); }

        function updateLiveClock() { document.getElementById('displayToday').innerText = new Date().toLocaleString('id-ID'); }

        function createDateFromDay(day) {
            const now = new Date();
            const date = new Date(now.getFullYear(), now.getMonth(), parseInt(day));
            date.setHours(0,0,0,0);
            return date;
        }

        function countWorkDays(start, end) {
            let count = 0;
            let cur = new Date(start);
            while (cur <= end) {
                if (cur.getDay() !== 0) count++;
                cur.setDate(cur.getDate() + 1);
            }
            return count;
        }

        function getOverlapWorkDays(startA, endA, startB, endB) {
            const start = new Date(Math.max(new Date(startA), new Date(startB)));
            const end = new Date(Math.min(new Date(endA), new Date(endB)));
            return start > end ? 0 : countWorkDays(start, end);
        }

        function getCycleInfo(startDateStr, now) {
            const join = new Date(startDateStr);
            let cycleStart = new Date(now.getFullYear(), now.getMonth(), join.getDate());
            if (now < cycleStart) cycleStart = new Date(now.getFullYear(), now.getMonth() - 1, join.getDate());
            let cycleEnd = new Date(cycleStart.getFullYear(), cycleStart.getMonth() + 1, join.getDate());
            cycleEnd.setDate(cycleEnd.getDate() - 1);
            return { start: cycleStart, end: cycleEnd };
        }

        function calculateAccrual(emp, now) {
            if (!emp.isActive) return { netWorkDays: 0, holidayTaken: 0, totalAmount: 0 };
            const cycle = getCycleInfo(emp.startDate, now);
            const allHolidays = [...(emp.holidays || []), ...globalHolidays];
            
            let totalHolidayInCycle = 0;
            allHolidays.forEach(h => totalHolidayInCycle += getOverlapWorkDays(cycle.start, cycle.end, h.start, h.end));
            
            const stdDays = Math.max(1, countWorkDays(cycle.start, cycle.end) - totalHolidayInCycle);
            
            let holidayTaken = 0;
            allHolidays.forEach(h => holidayTaken += getOverlapWorkDays(cycle.start, now, h.start, h.end));
            
            const netWorkDays = Math.max(0, countWorkDays(cycle.start, now) - holidayTaken);
            const daily = emp.salary / stdDays;
            
            return { netWorkDays, holidayTaken, totalAmount: daily * netWorkDays };
        }

        function updateRealTimeValues() {
            updateLiveClock();
            const now = new Date();
            let grand = 0;
            employees.forEach(emp => {
                const calc = calculateAccrual(emp, now);
                grand += calc.totalAmount;
                const row = document.getElementById(`row-${emp.id}`);
                if (row && emp.isActive) {
                    row.querySelector('.live-amount').innerText = formatIDR(calc.totalAmount);
                    row.querySelector('.live-net').innerText = `${calc.netWorkDays} Hari (-${calc.holidayTaken})`;
                }
            });
            document.getElementById('grandTotal').innerText = formatIDR(grand);
        }

        async function saveEmployee() {
            const id = document.getElementById('editId').value;
            const name = document.getElementById('name').value;
            const salary = document.getElementById('salary').value;
            const day = document.getElementById('startDay').value;
            if(!name || !salary || !day) return showNotify("LENGKAPI DATA");

            const empData = {
                id: id ? parseInt(id) : Date.now(),
                name,
                salary: parseFloat(salary),
                startDate: new Date(new Date().getFullYear(), new Date().getMonth(), day).toISOString(),
                startDayInput: day,
                holidays: [...currentHolidays],
                isActive: true
            };

            if (id) {
                const idx = employees.findIndex(e => e.id == id);
                employees[idx] = empData;
            } else {
                employees.push(empData);
            }

            await syncToCloud();
            renderTable();
            resetForm();
        }

        function editEmployee(id) {
            const emp = employees.find(e => e.id == id);
            document.getElementById('editId').value = emp.id;
            document.getElementById('name').value = emp.name;
            document.getElementById('salary').value = emp.salary;
            document.getElementById('salaryDisplay').value = formatIDR(emp.salary);
            document.getElementById('startDay').value = emp.startDayInput;
            currentHolidays = [...(emp.holidays || [])];
            renderHolidayList();
            document.getElementById('formTitle').innerText = "Edit Karyawan";
            document.getElementById('btnCancel').classList.remove('hidden');
        }

        async function addGlobalHoliday() {
            const start = document.getElementById('globalHolidayStart').value;
            const end = document.getElementById('globalHolidayEnd').value;
            if (!start || !end) return;
            globalHolidays.push({ start: createDateFromDay(start).toISOString(), end: createDateFromDay(end).toISOString() });
            await syncToCloud();
            renderGlobalHolidayList();
            renderTable();
        }

        function addHolidayRow() {
            const start = document.getElementById('tempHolidayStart').value;
            const end = document.getElementById('tempHolidayEnd').value;
            if (!start || !end) return;
            currentHolidays.push({ start: createDateFromDay(start).toISOString(), end: createDateFromDay(end).toISOString() });
            renderHolidayList();
        }

        function renderTable() {
            const table = document.getElementById('payrollTable');
            table.innerHTML = '';
            document.getElementById('emptyState').classList.toggle('hidden', employees.length > 0);
            employees.forEach(emp => {
                const calc = calculateAccrual(emp, new Date());
                const row = document.createElement('tr');
                row.id = `row-${emp.id}`;
                row.className = `row-clickable ${!emp.isActive ? 'row-inactive' : ''}`;
                row.onclick = (e) => { if(!e.target.closest('button')) editEmployee(emp.id); };
                row.innerHTML = `
                    <td class="px-6 py-4">
                        <p class="font-bold">${emp.name}</p>
                        <p class="text-[9px] text-slate-400 font-bold live-net">${calc.netWorkDays} Hari</p>
                    </td>
                    <td class="px-6 py-4 text-right font-mono text-emerald-600 live-amount">${formatIDR(calc.totalAmount)}</td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="toggleStatus(${emp.id})" class="text-[10px] font-bold ${emp.isActive ? 'text-emerald-500' : 'text-slate-400'}">
                            ${emp.isActive ? 'AKTIF' : 'OFF'}
                        </button>
                    </td>
                `;
                table.appendChild(row);
            });
            updateRealTimeValues();
        }

        function renderGlobalHolidayList() {
            const container = document.getElementById('globalHolidayList');
            container.innerHTML = '';
            globalHolidays.forEach((h, i) => {
                const div = document.createElement('div');
                div.className = "flex justify-between text-[10px] bg-emerald-50 p-2 rounded-lg font-bold";
                div.innerHTML = `<span>${new Date(h.start).toLocaleDateString()} - ${new Date(h.end).toLocaleDateString()}</span>
                                <button onclick="removeGlobal(${i})" class="text-red-500">X</button>`;
                container.appendChild(div);
            });
        }

        function renderHolidayList() {
            const container = document.getElementById('holidayList');
            container.innerHTML = '';
            currentHolidays.forEach((h, i) => {
                const div = document.createElement('div');
                div.className = "flex justify-between text-[10px] bg-slate-100 p-2 rounded-lg";
                div.innerHTML = `<span>${new Date(h.start).toLocaleDateString()} - ${new Date(h.end).toLocaleDateString()}</span>
                                <button onclick="removeHoliday(${i})" class="text-red-500">X</button>`;
                container.appendChild(div);
            });
        }

        async function toggleStatus(id) {
            const idx = employees.findIndex(e => e.id == id);
            employees[idx].isActive = !employees[idx].isActive;
            await syncToCloud();
            renderTable();
        }

        async function removeGlobal(i) { globalHolidays.splice(i, 1); await syncToCloud(); renderGlobalHolidayList(); renderTable(); }
        function removeHoliday(i) { currentHolidays.splice(i, 1); renderHolidayList(); }

        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('name').value = '';
            document.getElementById('salary').value = '';
            document.getElementById('salaryDisplay').value = '';
            document.getElementById('startDay').value = '';
            currentHolidays = [];
            renderHolidayList();
            document.getElementById('formTitle').innerText = "Data Karyawan";
            document.getElementById('btnCancel').classList.add('hidden');
        }

        function showNotify(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 2000);
        }
    </script>
</body>
</html>
